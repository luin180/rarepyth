# Global and Start Parameters
SYSTEM  =  name
KPAR    =  4
NCORE   =  8
# LPLANE = .FALSE.     (Real space distribution, supercells)
NWRITE  =  2           (Level of output)
PREC    =  Accurate    (Precision level: Normal or Accurate)
# ADDGRID = .TRUE.     (Increase grid, helps GGA convergence)
ISTART  =  1           (Job   : 0-new  1-cont  2-samecut)
ICHARG  =  1           (Charge: 1-file 2-atom 10-const)
ISPIN   =  1           (Spin polarized calculation)
# LASPH = .TRUE.       (Non-spherical elements, d/f convergence)

# Electronic Relaxation
ENCUT   =  450         (Cut-off energy for plane wave basis set, in eV)
NELM    =  200         (Max electronic SCF steps)
NELMIN  =  6           (Min electronic SCF steps)
EDIFF   =  1E-07       (SCF energy convergence, in eV)
LREAL   =  Auto        (Projection operators: automatic)
# GGA_COMPAT = .FALSE. (Apply spherical cutoff on gradient field)
# LMAXMIX =            (For d elements increase LMAXMIX to 4, f: LMAXMIX = 6)
ALGO    =  Normal
AMIX    =  0.4         (Mixing parameter to control SCF convergence)
BMIX    =  1.0         (Mixing parameter to control SCF convergence)
# AMIX_MAG = 0.4       (Mixing parameter to control SCF convergence)
# BMIX_MAG = 0.0001    (Mixing parameter to control SCF convergence)

# Ionic Relaxation
EDIFFG  =  -2E-02      (Ionic convergence, eV/AA)
NSW     =  100
IBRION  =  2           (Algorithm: 0-MD, 1-Quasi-New, 2-CG)
# NFREE =  2           (displacement freedom)
ISIF    =  2           (Stress/relaxation: 2-Ions, 3-Shape/Ions/V, 4-Shape/Ions)
# ISYM  =  2           (Symmetry: 0=none, 2=GGA, 3=hybrids)
POTIM   =  0.5

# DOS Related Values
ISMEAR  =  0
SIGMA   =  0.05

# Collinear Magnetic 
# MAGMOM =             (Set this parameters manually)

# Write Flags
# LWAVE = .FALSE.      (Write WAVECAR or not)
# LCHARG = .FALSE.     (Write CHGCAR or not)
# LAECHG = .TRUE.      (Write core charge into CHGCAR file)
# LVTOT = .TRUE.       (Write total electrostatic potential into LOCPOT or not)
# LVHAR = .TRUE.       (Write ionic + Hartree electrostatic potential into LOCPOT or not)
# LELF  = .TRUE.       (Write electronic localiz. function (ELF))
# LORBIT = 11          (PAW radii for projected DOS)

# Dipole Corrections
# LDIPOL = .TRUE.      (Correct potential)
# IDIPOL = 3           (1-x, 2-y, 3-z, 4-all directions)

# LDA+U Corrections
# LDAU  = .TRUE.
# LDAUTYPE = 2
# LDAUL =
# LDAUU =
# LDAUJ =

# Exchange Correlation Treatment
# GGA   =  PE
# VOSKOWN = 1          (Vosko Wilk Nusair interpolation, Enhances the magnetic moments and the magnetic energies)

# Van der Waals Corrections
# IVDW  =  12          (11=DFT-D3, 12=DFT-D3-BJ)

# Virtual Crystal Weights 
# NELECT =             (No. of electrons: charged cells, be careful)

# Dimension of Arrays
